name: Ejecutar scrapper semanal y subir a Azure (CON timestamp)

on:
  schedule:
    # Viernes 14:40 Guatemala = 20:40 UTC
    - cron: '35 20 * * 5'
  workflow_dispatch:

jobs:
  ejecutar-notebook:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install azure-storage-blob papermill

    - name: Ejecutar notebook
      run: |
        papermill "Financial_Markets_&_Commodities_Scrapper_Weekly.ipynb" "salida.ipynb"

    - name: Subir archivo a Azure Blob Storage (versionado + archivo fijo)
      env:
        AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      run: |
        python - <<EOF
        from azure.storage.blob import BlobServiceClient, ContentSettings
        from datetime import datetime
        import os
        import sys
        
        connection_string = os.environ['AZURE_STORAGE_CONNECTION_STRING']
        container_name = 'cabidataanalyticsdev'
        blob_folder = 'Data_Bases_Documents/Weekly'
        
        # Timestamp UTC (recomendado para pipelines)
        timestamp = datetime.utcnow().strftime('%Y%m%d_%H%M%S')
        
        versioned_file_name = f'FinancialMarketsBU_{timestamp}.xlsx'
        versioned_blob_name = f'{blob_folder}/{versioned_file_name}'
        
        print(f'Subiendo archivo versionado: {versioned_blob_name}')
        
        blob_service_client = BlobServiceClient.from_connection_string(connection_string)
        content_settings = ContentSettings(
            content_type='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        )
        
        try:
            # Subir archivo versionado (NO overwrite)
            versioned_blob_client = blob_service_client.get_blob_client(
                container=container_name,
                blob=versioned_blob_name
            )
            
            with open('FinancialMarketsBU.xlsx', 'rb') as data:
                versioned_blob_client.upload_blob(
                    data,
                    overwrite=False,
                    content_settings=content_settings
                )
            
            print("✓ Archivo versionado subido correctamente")
            print(f"URL: {versioned_blob_client.url}")
            
            # Actualizar archivo fijo (overwrite permitido)
            fixed_blob_name = f'{blob_folder}/FinancialMarketsBU.xlsx'
            fixed_blob_client = blob_service_client.get_blob_client(
                container=container_name,
                blob=fixed_blob_name
            )
            
            with open('FinancialMarketsBU.xlsx', 'rb') as data:
                fixed_blob_client.upload_blob(
                    data,
                    overwrite=True,
                    content_settings=content_settings
                )
            
            print("✓ Archivo oficial actualizado")
        
        except Exception as e:
            print(f"❌ Error al subir archivo: {str(e)}")
            sys.exit(1)
        
        EOF

    - name: Subir archivo Excel como artefacto (backup)
      uses: actions/upload-artifact@v4
      with:
        name: reporte-financiero-${{ github.run_number }}
        path: FinancialMarketsBU.xlsx